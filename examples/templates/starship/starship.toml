palette = "themer"

[palettes.themer]
background = "{{ base00 | hex_hash }}"
current_line = "{{ base01 | hex_hash }}"
foreground = "{{ base05 | hex_hash }}"
comment = "{{ grey | hex_hash }}"
cyan = "{{ cyan | hex_hash }}"
green = "{{ green | hex_hash }}"
orange = "{{ orange | hex_hash }}"
pink = "{{ pink | hex_hash }}"
purple = "{{ purple | hex_hash }}"
red = "{{ red | hex_hash }}"
yellow = "{{ yellow | hex_hash }}"
white = "{{ white | hex_hash }}"
blue = "{{ blue | hex_hash }}"
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "blue"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = ""
untracked = ""
modified = ""
staged = ""
renamed = ""
deleted = ""
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []

[battery]
disable = true
